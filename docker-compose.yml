# ─────────────────────────────────────────────────────────────────────────────
# Lynx — Full Stack Docker Compose
#
# One command to run everything:
#   docker compose up -d
#
# Default ports (override via .env or environment variables):
#   Dashboard  → http://localhost:7137
#   API        → http://localhost:4747
#   PostgreSQL → localhost:5433   (internal: 5432)
#   Redis      → localhost:6382   (internal: 6379)
#   Qdrant     → localhost:6340   (internal: 6333)
#
# Why these ports? They avoid conflicts with common dev tools:
#   3000/3001 → React/Next.js dev servers
#   4000/4001 → Common API dev ports
#   5000/5001 → Flask / .NET
#   5432      → System PostgreSQL
#   6379      → System Redis
#   8080      → Common HTTP dev
#
# Ollama runs NATIVELY on your host (required for GPU access).
# The API connects to it via host.docker.internal:11434.
# Install: curl -fsSL https://ollama.com/install.sh | sh && ollama serve
#
# Platform notes:
#   Linux:   Works out of the box. extra_hosts adds host-gateway automatically.
#   macOS:   host.docker.internal is built-in to Docker Desktop.
#   Windows: host.docker.internal is built-in to Docker Desktop for Windows.
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Dashboard — React SPA served by nginx ──────────────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
    container_name: lynx-dashboard
    restart: unless-stopped
    ports:
      - "${LYNX_DASHBOARD_PORT:-7137}:80"
    depends_on:
      api:
        condition: service_healthy
    environment:
      - LYNX_API_URL=http://api:4747
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── API — Fastify backend ──────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: lynx-api
    restart: unless-stopped
    ports:
      - "${LYNX_API_PORT:-4747}:4747"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    environment:
      # Server
      API_PORT: 4747
      API_HOST: 0.0.0.0
      NODE_ENV: production
      LOG_LEVEL: info

      # DB
      DATABASE_URL: postgresql://lynx:${POSTGRES_PASSWORD:-lynx_dev}@postgres:5432/lynx
      REDIS_URL: redis://:${REDIS_PASSWORD:-}@redis:6379

      # Vector store
      QDRANT_URL: http://qdrant:6333

      # Ollama — connects to host machine (GPU-accelerated)
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-}

      # LLM API keys (optional — set in .env)
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}

      # Auth
      JWT_SECRET: ${JWT_SECRET:-lynx-change-in-production}

      # Dashboard CORS
      DASHBOARD_ORIGIN: http://localhost:${LYNX_DASHBOARD_PORT:-7137}
    extra_hosts:
      # Linux: map host.docker.internal → host gateway (Mac/Windows have this built-in)
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:4747/api/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 15s
      timeout: 5s
      start_period: 15s
      retries: 5

  # ── PostgreSQL + pgvector ──────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: lynx-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: lynx
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lynx_dev}
      POSTGRES_DB: lynx
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      # Host port is non-conflicting; container port stays standard 5432
      - "${LYNX_PG_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lynx -d lynx"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: lynx-redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      ${REDIS_PASSWORD:+--requirepass ${REDIS_PASSWORD}}
    ports:
      - "${LYNX_REDIS_PORT:-6382}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Qdrant — vector store ──────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: lynx-qdrant
    restart: unless-stopped
    ports:
      - "${LYNX_QDRANT_PORT:-6340}:6333"
      # gRPC (optional, for direct access)
      - "${LYNX_QDRANT_GRPC_PORT:-6341}:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
      QDRANT__SERVICE__GRPC_PORT: 6334
      QDRANT__LOG_LEVEL: WARN
    healthcheck:
      test: ["CMD-SHELL", "timeout 3 bash -c 'cat < /dev/null > /dev/tcp/localhost/6333' && echo ok || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
    name: lynx_postgres_data
  redis_data:
    name: lynx_redis_data
  qdrant_data:
    name: lynx_qdrant_data

networks:
  default:
    name: lynx-network
